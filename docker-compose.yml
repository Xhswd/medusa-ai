services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: medusa
      POSTGRES_PASSWORD: medusa_password
      POSTGRES_DB: medusa_ai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medusa"]
      interval: 5s
      timeout: 5s
      retries: 5

  medusa:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://medusa:medusa_password@postgres:5432/medusa_ai
      JWT_SECRET: ${JWT_SECRET:-supersecret}
      COOKIE_SECRET: ${COOKIE_SECRET:-supersecret}
      NODE_ENV: production
      MEDUSA_WORKER_MODE: shared
      DISABLE_MEDUSA_ADMIN: "false"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      AI_DEFAULT_PROVIDER: ${AI_DEFAULT_PROVIDER:-openai}
    ports:
      - "9000:9000"
    restart: unless-stopped

volumes:
  postgres_data:
